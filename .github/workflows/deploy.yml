# .github/workflows/deploy.yml
# ---------------------------------------------------------------------------
# ARSENAL production deploy: GitHub Actions build + wrangler deploy to
# Cloudflare Workers.
#
# Replaces Cloudflare Workers Builds, whose 20 GB build disk the full
# 16-locale static export exceeded on 2026-07-09 (ENOSPC during the
# .next -> out/ copy phase at 9,893 pages).
#
# Required repository secrets (GitHub repo -> Settings -> Secrets and
# variables -> Actions -> New repository secret):
#   CLOUDFLARE_API_TOKEN   API token from the "Edit Cloudflare Workers"
#                          template (Cloudflare dashboard -> Account API
#                          Tokens -> Create Token). Never commit it.
#   CLOUDFLARE_ACCOUNT_ID  Account ID from the Workers & Pages overview
#                          page (right-hand API section).
#
# D-19: all code commented. Action syntax and runner-disk figures verified
# against Cloudflare and GitHub documentation on 2026-07-09.
# ---------------------------------------------------------------------------

name: Deploy ARSENAL to Cloudflare Workers

on:
  push:
    branches: [main]     # production tracks main, same trigger Workers Builds used
  workflow_dispatch:     # manual "Run workflow" button for re-deploys without a push

# One production deploy at a time. New pushes queue behind a running deploy.
# Never cancel mid-deploy: a half-uploaded Worker version helps nobody.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read         # checkout only; deploy auth is the Cloudflare API token

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Guardrail, NOT a target. Raised 45 -> 90 on 2026-07-23 after a run was
    # killed at "maximum execution time of 45m0s".
    # Measured reality at ~9,800 pages / 16 locales: the build step alone took
    # 33m56s on 2026-07-23, and that run then FAILED FAST at the deploy step
    # (asset ceiling, 48s). With the ceiling fixed, wrangler actually uploads
    # ~72,700 assets, which adds real minutes on top of the build - so the
    # true end-to-end cost crossed 45m for the first time.
    # 90 leaves headroom for growth while staying far below GitHub's HARD
    # platform limit of 360 minutes per job on hosted runners (verified
    # against docs.github.com/actions/reference/actions-limits, 2026-07-23);
    # timeout-minutes cannot be raised above that on ubuntu-latest.
    # If a run ever approaches 90, the fix is to cut build time (see the
    # step-level timeouts below), not to keep raising this number.
    timeout-minutes: 90

    steps:
      # ---------------------------------------------------------------------
      # 1. Reclaim disk. GitHub guarantees only 14 GB free on hosted runners;
      #    fresh runners typically show ~20-29 GB. Deleting preinstalled
      #    toolchains this build never uses (Android SDK ~14 GB, .NET ~2.7 GB,
      #    Haskell, CodeQL) takes under a minute and puts us far clear of the
      #    ~18 GB peak (.next + out/ + node_modules + repo) the export needs.
      # ---------------------------------------------------------------------
      - name: Free runner disk space
        run: |
          echo "Disk before cleanup:" && df -h /
          sudo rm -rf /usr/local/lib/android      # Android SDK
          sudo rm -rf /usr/share/dotnet           # .NET runtimes and SDKs
          sudo rm -rf /usr/local/.ghcup           # Haskell toolchain
          sudo rm -rf /opt/hostedtoolcache/CodeQL # CodeQL bundles
          echo "Disk after cleanup:" && df -h /

      - name: Checkout
        uses: actions/checkout@v6

      # Node pin comes from .node-version (single source of truth, shared with
      # ci.yml and Cloudflare). It is 22 because wrangler >= 4.110, miniflare,
      # and @cloudflare/kv-asset-handler all require Node >= 22; on Node 20 the
      # wrangler deploy step aborts with "requires at least Node.js v22.0.0".
      # "cache: npm" caches ~/.npm only, never .next, so it is disk-cheap.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm

      # Next.js build cache. Most deploys change CONTENT (mdx, i18n JSON,
      # glossary) rather than code, and Next can reuse compiled output across
      # runs, which is the cheapest available cut to the 33m56s build step.
      # Keyed on lockfile + source hash so a dependency or code change
      # invalidates it; restore-keys lets a content-only change still hit a
      # warm cache. .next/cache ONLY - never .next or out/, which are large
      # and must be regenerated. Added 2026-07-23 after the 45m job timeout.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-
            nextjs-

      - name: Install dependencies
        run: npm ci

      # ---------------------------------------------------------------------
      # 2. Full build, unchanged from package.json: prebuild guard chain,
      #    next build (static export), pagefind index, machine-legible
      #    generation. GitHub Actions sets CI=true automatically, so a
      #    webpack-cache gate in next.config
      #    ("if (process.env.CI) config.cache = false") activates here
      #    with no extra wiring, if/when added.
      #    On failure, print disk state so any future ENOSPC reports its
      #    exact shortfall instead of failing silently.
      # ---------------------------------------------------------------------
      - name: Build (guards + export + pagefind + machine-legible)
        # Step-level bound: the job guardrail is 90 min, but a HUNG build
        # should not consume all of it. 60 min is ~1.8x the measured 33m56s.
        timeout-minutes: 60
        run: |
          npm run build || {
            echo "BUILD FAILED. Disk state at failure:"
            df -h /
            du -sh .next out node_modules 2>/dev/null || true
            exit 1
          }

      # Visibility on the Workers static-asset budget:
      # 100,000 files per version on Paid plans (needs Wrangler >= 4.34.0),
      # 20,000 on Free. Printed every run so growth is visible in the logs.
      - name: Report asset count and disk state
        run: |
          # Budget math (2026-07-23 incident, Cloudflare error 10304):
          # the cap is 100,000 MANIFEST files per version (Paid). The RSC
          # index.txt payloads are excluded from the manifest by
          # out/.assetsignore, so the number that counts is EFFECTIVE =
          # TOTAL - IGNORED. Fail loudly here at >97,000 instead of
          # letting wrangler fail 35 minutes in. Strategic options live in
          # concord canon/PKG-asset-budget-2026-07-23.md.
          TOTAL=$(find out -type f | wc -l)
          IGNORED=$(find out -name 'index.txt' | wc -l)
          EFFECTIVE=$((TOTAL - IGNORED))
          echo "out/ total: ${TOTAL}; ignored by .assetsignore (index.txt): ${IGNORED}"
          echo "EFFECTIVE manifest estimate: ${EFFECTIVE} of 100,000 (gate: 97,000)"
          test -f out/.assetsignore || { echo "::error::out/.assetsignore missing - manifest would include index.txt and likely exceed 100,000"; exit 1; }
          if [ "${EFFECTIVE}" -gt 97000 ]; then
            echo "::error::Asset budget gate: effective manifest ${EFFECTIVE} > 97,000. Act on PKG-asset-budget-2026-07-23 before deploying."
            exit 1
          fi
          df -h /

      # ---------------------------------------------------------------------
      # 3. Deploy. wrangler-action runs "wrangler deploy" by default and
      #    reads the wrangler config at the repo root (the same one Workers
      #    Builds used), so no config change is needed. Keep wrangler pinned
      #    at >= 4.34.0 in devDependencies so local and CI deploys match.
      # ---------------------------------------------------------------------
      - name: Deploy to Cloudflare Workers
        # Uploading ~72,700 assets takes minutes; a stuck upload should fail
        # here rather than at the job guardrail, so the log points at the
        # right step.
        timeout-minutes: 25
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # To force a specific wrangler version for the deploy step,
          # uncomment and pin:
          # wranglerVersion: "4.34.0"

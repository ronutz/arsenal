# ============================================================================
# Dependabot — automated dependency update PRs. Two ecosystems:
#   - npm            : the app's runtime + dev dependencies.
#   - github-actions : the action versions pinned in .github/workflows/*.
# Weekly cadence keeps noise low for a solo maintainer; grouping minor+patch
# bumps into one PR per ecosystem keeps the review small.
# ============================================================================

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    # Next.js 16 was tried and reverted: its static-export artifact bloat overflows
    # the Cloudflare Workers build disk for this many-page multilingual export. Hold
    # next / next-intl at their current major until the 16 migration is planned
    # deliberately (Dependabot still offers minor + patch bumps within the major).
    # TypeScript 6.0 is likewise held at 5.x: a major tsc bump tightens type-checking
    # and removes deprecated flags, and the whole build gates on a clean `tsc --noEmit`
    # across every generated page, so the 6.0 migration is planned deliberately too.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-intl"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"

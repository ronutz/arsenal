# ============================================================================
# Dependabot — automated dependency update PRs. Two ecosystems:
#   - npm            : the app's runtime + dev dependencies.
#   - github-actions : the action versions pinned in .github/workflows/*.
# Weekly cadence keeps noise low for a solo maintainer; grouping minor+patch
# bumps into one PR per ecosystem keeps the review small.
# ============================================================================

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"

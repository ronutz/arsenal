        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dig-output-explainer:
    get:
      tags:
        - Networking & addressing
      operationId: run_dig_output_explainer
      summary: dig output explainer
      description: >-
        Paste real dig output and get a decoded, explained breakdown: the header and flags, the EDNS
        OPT pseudo-section, every record in each section, and the query stats. Parsed entirely in
        your browser, nothing is resolved or sent anywhere. Standards: RFC 1035, RFC 6891, RFC 2308,
        RFC 8499. Stateless and side-effect-free: the same input always yields the same result, and
        nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input.
          schema:
            type: string
            examples:
              - ';; ->>HEADER<<- opcode: QUERY, status: NOERROR, id: 4321'
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Networking & addressing
      operationId: run_dig_output_explainer_post
      summary: dig output explainer (POST)
      description: >-
        Paste real dig output and get a decoded, explained breakdown: the header and flags, the EDNS
        OPT pseudo-section, every record in each section, and the query stats. Parsed entirely in
        your browser, nothing is resolved or sent anywhere. Standards: RFC 1035, RFC 6891, RFC 2308,
        RFC 8499. Stateless and side-effect-free: the same input always yields the same result, and

openapi: 3.1.0
info:
  title: ronutz tools API
  version: 1.1.0
  summary: Deterministic network and security computations over HTTP.
  description: |
    The programmatic counterpart to the in-browser tools at ronutz.com.

    Every operation here is a pure function: the same input always yields the
    same output, nothing is stored, and no request bodies or query values are
    logged. The browser tools remain the zero-egress default for sensitive work;
    this API exists for automation (scripts, pipelines, integrations).

    The surface grows with the toolbox: every shipped tool is exposed here and
    documented from the same registry, so the served endpoints and this document
    cannot drift apart. Only shipped tools are listed (no vaporware). Each
    operation accepts its input via GET (?input=) or POST (the request body) and
    returns a JSON result.
  contact:
    name: ronutz
    url: https://ronutz.com/contact
  license:
    name: Apache-2.0 (code), CC-BY-4.0 (content)
    url: https://ronutz.com/colophon
servers:
  - url: https://ronutz.com/api/v1
    description: Production edge (Cloudflare Worker, stateless, no request logging)
tags:
  - name: Encoding
  - name: Extreme switching & fabric (EXOS / VOSS / SPB)
  - name: F5 Distributed Cloud (XC)
  - name: F5 GTM, AFM & APM
  - name: F5 LTM, iRules & platform
  - name: F5 automation (AS3 / DO)
  - name: Fortinet FortiGate & FortiOS
  - name: HTTP & web
  - name: Hashing
  - name: Identifiers & time
  - name: Identity & tokens
  - name: Netskope SSE / SASE
  - name: Networking
  - name: Networking & addressing
    description: IP addressing and subnet computations.
  - name: PKI
  - name: Protocol & packet decoders
  - name: Security & WAF
  - name: TLS & transport
  - name: Text & utilities
paths:
  /acme-dns01:
    get:
      tags:
        - PKI
      operationId: run_acme_dns01
      summary: ACME dns-01 TXT computer
      description: >-
        Compute the TXT record for an ACME dns-01 challenge, from the token and account key. The
        input is a JSON object: send it as the request body (POST) or as a JSON string (?input=).
        Standards: RFC 8555, RFC 7638, RFC 4648. Stateless and side-effect-free: the same input
        always yields the same result, and nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input, as a JSON string.
          schema:
            type: string
            examples:
              - ACME dns-01 token + account key JWK
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - PKI
      operationId: run_acme_dns01_post
      summary: ACME dns-01 TXT computer (POST)
      description: >-
        Compute the TXT record for an ACME dns-01 challenge, from the token and account key. The
        input is a JSON object: send it as the request body (POST) or as a JSON string (?input=).
        Standards: RFC 8555, RFC 7638, RFC 4648. Stateless and side-effect-free: the same input
        always yields the same result, and nothing is stored or logged.
      requestBody:
        required: true
        description: The tool input as a JSON object.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /as3-explainer-validator:
    get:
      tags:
        - F5 automation (AS3 / DO)
      operationId: run_as3_explainer_validator
      summary: AS3 declaration explainer
      description: >-
        Paste the JSON you POST to /mgmt/shared/appsvcs/declare and it reads it back: whether it is
        a full AS3 request or an ADC-only declaration, the schemaVersion and metadata, and the
        Tenant to Application to resource tree with every class explained, while checking the
        structural rules F5 documents. Runs entirely in your browser. Standards: F5 BIG-IP AS3 user
        guide, F5 AS3 schema reference. Stateless and side-effect-free: the same input always yields
        the same result, and nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input.
          schema:
            type: string
            examples:
              - >-
                { "class": "AS3", "action": "deploy", "declaration": { "class": "ADC",
                "schemaVersion": "3.0.0" } }
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - F5 automation (AS3 / DO)
      operationId: run_as3_explainer_validator_post
      summary: AS3 declaration explainer (POST)
      description: >-
        Paste the JSON you POST to /mgmt/shared/appsvcs/declare and it reads it back: whether it is
        a full AS3 request or an ADC-only declaration, the schemaVersion and metadata, and the
        Tenant to Application to resource tree with every class explained, while checking the
        structural rules F5 documents. Runs entirely in your browser. Standards: F5 BIG-IP AS3 user
        guide, F5 AS3 schema reference. Stateless and side-effect-free: the same input always yields
        the same result, and nothing is stored or logged.
      requestBody:
        required: true
        description: The tool input as text.
        content:
          text/plain:
            schema:
              type: string
              examples:
                - >-
                  { "class": "AS3", "action": "deploy", "declaration": { "class": "ADC",
                  "schemaVersion": "3.0.0" } }
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /base64:
    get:
      tags:
        - Encoding
      operationId: run_base64
      summary: Base64, Base32, Hex & Percent Codec
      description: >-
        Encode text to Base64, URL-safe Base64, Base32, hexadecimal, or percent-encoding, and decode
        any of them back. Tolerant of missing padding and whitespace, and it flags binary
        (non-UTF-8) results. Runs entirely in your browser. Standards: RFC 4648, RFC 3986. Stateless
        and side-effect-free: the same input always yields the same result, and nothing is stored or
        logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input.
          schema:
            type: string
            examples:
              - SGVsbG8gV29ybGQ=
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Encoding
      operationId: run_base64_post
      summary: Base64, Base32, Hex & Percent Codec (POST)
      description: >-
        Encode text to Base64, URL-safe Base64, Base32, hexadecimal, or percent-encoding, and decode
        any of them back. Tolerant of missing padding and whitespace, and it flags binary
        (non-UTF-8) results. Runs entirely in your browser. Standards: RFC 4648, RFC 3986. Stateless
        and side-effect-free: the same input always yields the same result, and nothing is stored or
        logged.
      requestBody:
        required: true
        description: The tool input as text.
        content:
          text/plain:
            schema:
              type: string
              examples:
                - SGVsbG8gV29ybGQ=
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cert-renewal-planner:
    get:
      tags:
        - PKI
      operationId: run_cert_renewal_planner
      summary: Certificate renewal planner
      description: >-
        Work out a TLS certificate's validity, whether it fits the CA/Browser Forum 47-day schedule,
        and the renewal cadence it implies — all offline. The input is a JSON object: send it as the
        request body (POST) or as a JSON string (?input=). Standards: CA/Browser Forum SC-081v3, RFC
        5280, RFC 8555. Stateless and side-effect-free: the same input always yields the same
        result, and nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input, as a JSON string.
          schema:
            type: string
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:

components:
  schemas:
    CidrResult:
      type: object
      description: The full breakdown of an IPv4 CIDR block.
      required:
        - input
        - network
        - broadcast
        - netmask
        - wildcard
        - firstHost
        - lastHost
        - totalAddresses
        - usableHosts
      properties:
        input:
          type: string
          description: >-
            The input echoed back in canonical dotted-quad form. Host bits are preserved here; see
            `network` for the masked base address.
          examples:
            - 192.168.1.0/24
        network:
          type: string
          description: The network (base) address.
          examples:
            - 192.168.1.0
        broadcast:
          type: string
          description: The broadcast address. For a /31 or /32 this equals the upper address.
          examples:
            - 192.168.1.255
        netmask:
          type: string
          description: The subnet mask in dotted-decimal form.
          examples:
            - 255.255.255.0
        wildcard:
          type: string
          description: The inverse (wildcard) mask, as used in ACLs.
          examples:
            - 0.0.0.255
        firstHost:
          type: string
          description: The first usable host address.
          examples:
            - 192.168.1.1
        lastHost:
          type: string
          description: The last usable host address.
          examples:
            - 192.168.1.254
        totalAddresses:
          type: integer
          minimum: 1
          description: Total addresses in the block (2 ^ host bits).
          examples:
            - 256
        usableHosts:
          type: integer
          minimum: 0
          description: >
            Addresses assignable to hosts. For /0–/30 this excludes the network and broadcast
            addresses; /31 yields 2 and /32 yields 1.
          examples:
            - 254
    Error:
      type: object
      description: A structured error. No request input is echoed beyond what is needed to explain the problem.
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: A stable, machine-readable error code.
          examples:
            - invalid_cidr
        message:
          type: string
          description: A human-readable explanation.
          examples:
            - Not a valid IPv4 CIDR block. Expected something like 192.168.1.0/24.
    ToolResult:
      type: object
      description: >
        The tool's computed result as a JSON object. The exact fields depend on the tool; see the
        tool's page at https://ronutz.com for the full shape. The result is a pure function of the
        input, so the same input always yields the same output.
      additionalProperties: true

      operationId: run_f5_afm_rule_context
      summary: AFM rule-context & match explainer
      description: >-
        Walk a packet through AFM's documented context order and watch the semantics that decide
        real outcomes: accept passes one context and the traffic is processed again at the next,
        only accept-decisively ends the walk, ICMP rules at a virtual server or self IP are ignored,
        and staged policies log without enforcing. A lone policy gets the redundant-and-conflicting
        audit the system itself defines. Standards: F5 BIG-IP AFM Network Firewall. Stateless and
        side-effect-free: the same input always yields the same result, and nothing is stored or
        logged.
      parameters:
        - name: input
          in: query

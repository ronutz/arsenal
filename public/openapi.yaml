        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /diff:
    get:
      tags:
        - Text & utilities
      operationId: run_diff
      summary: Text Diff
      description: >-
        Compare two blocks of text and see exactly what changed, line by line, with inline
        word-level highlighting on edited lines. Optionally ignore whitespace or case. Everything is
        computed in your browser; your text is never sent anywhere. The input is a JSON object: send
        it as the request body (POST) or as a JSON string (?input=). Stateless and side-effect-free:
        the same input always yields the same result, and nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input, as a JSON string.
          schema:
            type: string
            examples:
              - original text vs revised text
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Text & utilities
      operationId: run_diff_post
      summary: Text Diff (POST)
      description: >-
        Compare two blocks of text and see exactly what changed, line by line, with inline
        word-level highlighting on edited lines. Optionally ignore whitespace or case. Everything is
        computed in your browser; your text is never sent anywhere. The input is a JSON object: send
        it as the request body (POST) or as a JSON string (?input=). Stateless and side-effect-free:
        the same input always yields the same result, and nothing is stored or logged.
      requestBody:
        required: true
        description: The tool input as a JSON object.
        content:
          application/json:
            schema:

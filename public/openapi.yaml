        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cidr:
    get:
      tags:
        - Networking & addressing
      operationId: computeCidr
      summary: Break down an IPv4 CIDR block
      description: >
        Computes the network and broadcast addresses, usable host range, host counts, netmask, and
        wildcard mask for an IPv4 CIDR block.

        Edge cases follow the common conventions: a `/31` is treated as an RFC 3021 point-to-point
        link (2 usable addresses, no separate broadcast), and a `/32` is a single host (1 usable
        address). For `/0`–`/30`, the network and broadcast addresses are excluded from the usable
        host count.
      externalDocs:
        description: 'RFC 4632: Classless Inter-Domain Routing'
        url: https://www.rfc-editor.org/rfc/rfc4632
      parameters:
        - name: block
          in: query
          required: true
          description: An IPv4 CIDR block, host bits optional (they are masked off).
          schema:
            type: string
            pattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
          examples:
            standard:
              summary: A /24 network
              value: 192.168.1.0/24
            hostBitsSet:
              summary: Host bits set (masked off automatically)
              value: 10.0.5.37/22
            pointToPoint:
              summary: RFC 3021 point-to-point
              value: 198.51.100.0/31
      responses:
        '200':
          description: The computed breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CidrResult'
              example:
                input: 192.168.1.0/24
                network: 192.168.1.0
                broadcast: 192.168.1.255
                netmask: 255.255.255.0
                wildcard: 0.0.0.255
                firstHost: 192.168.1.1
                lastHost: 192.168.1.254
                totalAddresses: 256
                usableHosts: 254
        '400':
          description: The input is missing or not a valid IPv4 CIDR block.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_cidr
                message: Not a valid IPv4 CIDR block. Expected something like 192.168.1.0/24.
  /cipher:
    get:
      tags:
        - TLS & transport
      operationId: run_cipher
      summary: Cipher Suite Decoder
      description: >-
        Enter a TLS cipher suite, as an IANA name, an OpenSSL or GnuTLS name, or a hex code point,
        to break it into its key exchange, authentication, cipher, mode, and MAC, with a
        plain-language security read-out and the official IANA recommendation. Runs entirely in your
        browser against a bundled copy of the IANA registry. Standards: IANA TLS Cipher Suites, RFC
        8446, RFC 5246, RFC 8447, RFC 7465. Stateless and side-effect-free: the same input always
        yields the same result, and nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input.
          schema:
            type: string
            examples:
              - TLS_AES_128_GCM_SHA256
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - TLS & transport
      operationId: run_cipher_post
      summary: Cipher Suite Decoder (POST)
      description: >-
        Enter a TLS cipher suite, as an IANA name, an OpenSSL or GnuTLS name, or a hex code point,
        to break it into its key exchange, authentication, cipher, mode, and MAC, with a
        plain-language security read-out and the official IANA recommendation. Runs entirely in your
        browser against a bundled copy of the IANA registry. Standards: IANA TLS Cipher Suites, RFC
        8446, RFC 5246, RFC 8447, RFC 7465. Stateless and side-effect-free: the same input always
        yields the same result, and nothing is stored or logged.
      requestBody:
        required: true
        description: The tool input as text.
        content:
          text/plain:
            schema:
              type: string
              examples:
                - TLS_AES_128_GCM_SHA256
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /csr-decoder:
    get:
      tags:
        - PKI
      operationId: run_csr_decoder
      summary: CSR decoder
      description: >-
        Decode a PKCS#10 certificate signing request to read its subject, public key, requested SANs
        and extensions, and attributes — entirely in your browser. The input is a JSON object: send
        it as the request body (POST) or as a JSON string (?input=). Standards: PKCS#10 / RFC 2986,
        RFC 5280. Stateless and side-effect-free: the same input always yields the same result, and
        nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input, as a JSON string.
          schema:
            type: string
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - PKI
      operationId: run_csr_decoder_post
      summary: CSR decoder (POST)
      description: >-
        Decode a PKCS#10 certificate signing request to read its subject, public key, requested SANs
        and extensions, and attributes — entirely in your browser. The input is a JSON object: send
        it as the request body (POST) or as a JSON string (?input=). Standards: PKCS#10 / RFC 2986,
        RFC 5280. Stateless and side-effect-free: the same input always yields the same result, and
        nothing is stored or logged.
      requestBody:
        required: true
        description: The tool input as a JSON object.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cvss-vector-decoder:
    get:
      tags:
        - Security & WAF
      operationId: run_cvss_vector_decoder
      summary: CVSS vector decoder
      description: >-
        Paste a CVSS v3.1 or v3.0 vector and get the score computed and mapped to a severity, with
        every metric spelled out. Local and offline; nothing is sent anywhere. Standards: CVSS v3.1
        (FIRST.org). Stateless and side-effect-free: the same input always yields the same result,
        and nothing is stored or logged.
      parameters:
        - name: input
          in: query
          required: true
          description: The tool input.
          schema:
            type: string
            examples:
              - CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
      responses:
        '200':
          description: The computed result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: The input is missing or could not be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Security & WAF
      operationId: run_cvss_vector_decoder_post
      summary: CVSS vector decoder (POST)
      description: >-
        Paste a CVSS v3.1 or v3.0 vector and get the score computed and mapped to a severity, with
        every metric spelled out. Local and offline; nothing is sent anywhere. Standards: CVSS v3.1
        (FIRST.org). Stateless and side-effect-free: the same input always yields the same result,
        and nothing is stored or logged.
      requestBody:
        required: true
        description: The tool input as text.
        content:
          text/plain:
            schema:
              type: string
              examples:
                - CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
      responses:
